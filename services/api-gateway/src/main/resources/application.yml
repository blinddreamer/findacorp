server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    # Loads application-local.yml in dev; override with SPRING_PROFILES_ACTIVE in prod.
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
            - AddResponseHeader=Access-Control-Allow-Private-Network, true
            - AddResponseHeader=Access-Control-Allow-Origin, "*"

        - id: profile-service-profiles
          uri: lb://profile-service
          predicates:
            - Path=/profiles/**
          filters:
            - JwtAuthFilter

        - id: profile-service-search
          uri: lb://profile-service
          predicates:
            - Path=/search/**
          filters:
            - JwtAuthFilter

        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/inbox/**
          filters:
            - JwtAuthFilter

      globalcors:
        cors-configurations:
          '/profiles/**':
            allowed-origins: "http://localhost:3000"
            allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
            allowed-headers: "*"
            allow-credentials: true
          '/search/**':
            allowed-origins: "http://localhost:3000"
            allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
            allowed-headers: "*"
            allow-credentials: true
          '/inbox/**':
            allowed-origins: "http://localhost:3000"
            allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
            allowed-headers: "*"
            allow-credentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

jwt:
  secret: ${JWT_SECRET}
