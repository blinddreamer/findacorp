name: Build & Push Docker Images

# Builds an independent Docker image for each FINDACORP service and pushes them to Docker Hub.
# No image is built for `common` (a shared library).
#
# Only the services affected by a push are rebuilt:
#   - a change under services/<svc>/**            -> rebuilds just that service
#   - a change to common/**, the parent pom.xml,  -> rebuilds ALL services (they all depend on it)
#     the Dockerfile, or this workflow
#   - a change under frontend/**                   -> rebuilds just the frontend
#   - a tag push (v*) or a manual run             -> rebuilds everything (full release / forced run)
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  - your Docker Hub username (also the image namespace)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with read/write scope
#
# Images are published as:  docker.io/<DOCKERHUB_USERNAME>/findacorp-<service>
# Tagged with: `latest` (default branch only), the short commit SHA, and the git tag on v* tags.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_PREFIX: findacorp

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.decide.outputs.services }}   # JSON array of service names to build
      frontend: ${{ steps.decide.outputs.frontend }}   # "true" / "false"
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'pom.xml'
              - 'common/**'
              - 'Dockerfile'
              - '.github/workflows/docker-images.yml'
            eureka-server:
              - *shared
              - 'services/eureka-server/**'
            api-gateway:
              - *shared
              - 'services/api-gateway/**'
            auth-service:
              - *shared
              - 'services/auth-service/**'
            profile-service:
              - *shared
              - 'services/profile-service/**'
            data-collector:
              - *shared
              - 'services/data-collector/**'
            application-service:
              - *shared
              - 'services/application-service/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/docker-images.yml'

      - name: Decide what to build
        id: decide
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          ALL='["eureka-server","api-gateway","auth-service","profile-service","data-collector","application-service"]'
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Full build for releases and manual runs.
            echo "services=$ALL" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            # "shared" and "frontend" are filters, not buildable service modules — drop them.
            SERVICES=$(echo "$CHANGES" | jq -c 'map(select(. != "frontend" and . != "shared"))')
            echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
            if echo "$CHANGES" | jq -e 'index("frontend")' >/dev/null; then
              echo "frontend=true" >> "$GITHUB_OUTPUT"
            else
              echo "frontend=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    name: Build jars
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build changed modules
        env:
          SERVICES: ${{ needs.changes.outputs.services }}
        run: |
          # -am also-makes the `common` dependency the services need.
          PL=$(echo "$SERVICES" | jq -r 'map("services/" + .) | join(",")')
          mvn -B -ntp -DskipTests -pl "$PL" -am clean package

      - name: Stage service jars
        env:
          SERVICES: ${{ needs.changes.outputs.services }}
        run: |
          mkdir -p dist
          for s in $(echo "$SERVICES" | jq -r '.[]'); do
            cp services/"$s"/target/"$s"-*.jar dist/"$s".jar
          done

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: dist/
          retention-days: 1

  images:
    name: Image (${{ matrix.service }})
    needs: [changes, build]
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download jars
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: dist/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: ./Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # Map the service name to its secret suffix: auth-service -> AUTH_SERVICE
      - name: Resolve webhook secret name
        id: hook
        run: echo "name=$(echo '${{ matrix.service }}' | tr '[:lower:]' '[:upper:]' | tr '-' '_')" >> "$GITHUB_OUTPUT"

      # Opt-in auto-redeploy: only fires when a PORTAINER_WEBHOOK_<SERVICE> secret exists.
      - name: Trigger Portainer redeploy
        env:
          WEBHOOK: ${{ secrets[format('PORTAINER_WEBHOOK_{0}', steps.hook.outputs.name)] }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::notice::No PORTAINER_WEBHOOK_${{ steps.hook.outputs.name }} secret set — skipping auto-redeploy for ${{ matrix.service }}."
            exit 0
          fi
          echo "Triggering Portainer redeploy for ${{ matrix.service }}…"
          curl -fsS --retry 3 --retry-delay 5 -X POST "$WEBHOOK" -o /dev/null
          echo "Redeploy webhook accepted."

  frontend:
    name: Image (frontend)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # Opt-in auto-redeploy: only fires when the PORTAINER_WEBHOOK_FRONTEND secret exists.
      - name: Trigger Portainer redeploy
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_FRONTEND }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::notice::No PORTAINER_WEBHOOK_FRONTEND secret set — skipping auto-redeploy for frontend."
            exit 0
          fi
          echo "Triggering Portainer redeploy for frontend…"
          curl -fsS --retry 3 --retry-delay 5 -X POST "$WEBHOOK" -o /dev/null
          echo "Redeploy webhook accepted."
