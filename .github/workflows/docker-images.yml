name: Build & Push Docker Images

# Builds an independent Docker image for each FINDACORP service and pushes them to Docker Hub.
# No image is built for `common` (a shared library) or the frontend.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  - your Docker Hub username (also the image namespace)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with read/write scope
#
# Images are published as:  docker.io/<DOCKERHUB_USERNAME>/findacorp-<service>
# Tagged with: `latest` (default branch only), the short commit SHA, and the git tag on v* tags.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_PREFIX: findacorp

jobs:
  build:
    name: Build jars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build all modules
        run: mvn -B -ntp -DskipTests clean package

      - name: Stage service jars
        run: |
          mkdir -p dist
          for s in eureka-server api-gateway auth-service profile-service data-collector application-service; do
            cp services/"$s"/target/"$s"-*.jar dist/"$s".jar
          done

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: dist/
          retention-days: 1

  images:
    name: Image (${{ matrix.service }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - profile-service
          - data-collector
          - application-service
    steps:
      - uses: actions/checkout@v4

      - name: Download jars
        uses: actions/download-artifact@v4
        with:
          name: service-jars
          path: dist/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: ./Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  frontend:
    name: Image (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
